name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v1.9.0)'
        required: true

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Compute the source-tarball checksums and create the GitHub Release.
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag / version
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG"                 >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"         >> "$GITHUB_OUTPUT"

      - name: Download source tarball and compute checksums
        id: hash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          REPO="${{ github.repository }}"
          URL="https://github.com/$REPO/archive/refs/tags/$TAG.tar.gz"
          echo "Fetching $URL"
          curl -fsSL "$URL" -o "source.tar.gz"
          SHA256=$(shasum -a 256 source.tar.gz | awk '{print $1}')
          SHA512=$(shasum -a 512 source.tar.gz | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "sha512=$SHA512" >> "$GITHUB_OUTPUT"

      - name: Write CHECKSUMS.txt (with brew / vcpkg snippets)
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          REPO="${{ github.repository }}"
          URL="https://github.com/$REPO/archive/refs/tags/$TAG.tar.gz"
          cat > CHECKSUMS.txt <<EOF
          Source archive: $URL

          sha256: ${{ steps.hash.outputs.sha256 }}
          sha512: ${{ steps.hash.outputs.sha512 }}

          --- Homebrew (webpdf.rb) ---
          url "$URL"
          sha256 "${{ steps.hash.outputs.sha256 }}"

          --- vcpkg (ports/webpdf/portfile.cmake) ---
          vcpkg_from_github(
              OUT_SOURCE_PATH SOURCE_PATH
              REPO $REPO
              REF "\${VERSION}"
              SHA512 ${{ steps.hash.outputs.sha512 }}
          )
          EOF
          cat CHECKSUMS.txt

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2.0.1
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: webpdf ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            CHECKSUMS.txt
            source.tar.gz

  # ---------------------------------------------------------------------------
  # Build per-platform binary packages and upload them as workflow artifacts.
  # ---------------------------------------------------------------------------
  package:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            id: linux-x86_64
          - os: macos-latest
            id: macos-arm64
          - os: windows-latest
            id: windows-x86_64
    runs-on: ${{ matrix.os }}
    env:
      BUILD_TYPE: Release
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Install zlib (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - name: Configure / build / install
        shell: bash
        run: |
          EXTRA=""
          if [ "$RUNNER_OS" != "Windows" ]; then EXTRA="-DBUILD_SHARED_LIBS=ON"; fi
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DWEBPDF_BUILD_EXAMPLES=OFF \
            -DWEBPDF_FETCH_ZLIB=ON \
            -DCMAKE_INSTALL_PREFIX="$PWD/stage/webpdf-${{ needs.release.outputs.version }}" \
            $EXTRA
          cmake --build build --config $BUILD_TYPE -j
          cmake --install build --config $BUILD_TYPE

      - name: Package
        shell: bash
        run: |
          NAME="webpdf-${{ needs.release.outputs.version }}-${{ matrix.id }}"
          cd stage
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake -E tar cf "../$NAME.zip" --format=zip "webpdf-${{ needs.release.outputs.version }}"
          else
            cmake -E tar czf "../$NAME.tar.gz" "webpdf-${{ needs.release.outputs.version }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.3.0
        with:
          name: pkg-${{ matrix.id }}
          path: |
            webpdf-*.tar.gz
            webpdf-*.zip
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Attach the binary packages to the release once all builds succeed.
  # ---------------------------------------------------------------------------
  publish:
    needs: [ release, package ]
    runs-on: ubuntu-latest
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: pkg-*
          path: dist
          merge-multiple: true

      - name: Attach packages to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            dist/webpdf-*.tar.gz
            dist/webpdf-*.zip

  # ---------------------------------------------------------------------------
  # Read CHECKSUMS.txt from the release, rewrite webpdf.rb + the vcpkg portfile
  # with the real hashes, and open a pull request with the diff.
  # ---------------------------------------------------------------------------
  update-manifests:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download CHECKSUMS.txt from the release
        run: gh release download "${{ needs.release.outputs.tag }}" --pattern CHECKSUMS.txt --output CHECKSUMS.txt --clobber

      - name: Extract checksums
        id: sums
        run: |
          SHA256=$(grep -E '^sha256:' CHECKSUMS.txt | awk '{print $2}')
          SHA512=$(grep -E '^sha512:' CHECKSUMS.txt | awk '{print $2}')
          if [ -z "$SHA256" ] || [ -z "$SHA512" ]; then
            echo "::error::Could not parse sha256/sha512 from CHECKSUMS.txt"; cat CHECKSUMS.txt; exit 1
          fi
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "sha512=$SHA512" >> "$GITHUB_OUTPUT"

      - name: Rewrite manifests
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ needs.release.outputs.tag }}
          SHA256: ${{ steps.sums.outputs.sha256 }}
          SHA512: ${{ steps.sums.outputs.sha512 }}
        run: |
          python3 - <<'PY'
          import os, re

          repo   = os.environ["REPO"]
          tag    = os.environ["TAG"]
          sha256 = os.environ["SHA256"]
          sha512 = os.environ["SHA512"]
          url    = f"https://github.com/{repo}/archive/refs/tags/{tag}.tar.gz"

          # --- webpdf.rb : url + sha256 -------------------------------------
          with open("webpdf.rb") as f:
              rb = f.read()
          rb = re.sub(r'(?m)^(\s*)url ".*"$',    rf'\1url "{url}"',       rb)
          rb = re.sub(r'(?m)^(\s*)sha256 ".*"$', rf'\1sha256 "{sha256}"', rb)
          with open("webpdf.rb", "w") as f:
              f.write(rb)

          # --- ports/webpdf/portfile.cmake : activate vcpkg_from_github -----
          path = "ports/webpdf/portfile.cmake"
          with open(path) as f:
              pf = f.read()

          block = (
              "vcpkg_from_github(\n"
              "    OUT_SOURCE_PATH SOURCE_PATH\n"
              f"    REPO {repo}\n"
              '    REF "v${VERSION}"\n'
              f"    SHA512 {sha512}\n"
              "    HEAD_REF main\n"
              ")\n"
          )
          # Replace the existing (commented or active) vcpkg_from_github(...) block.
          # Anchored on "vcpkg_from_github(" + newline so prose mentions are skipped.
          pf = re.sub(r'(?m)^#?[ \t]*vcpkg_from_github\(\n[\s\S]*?^#?[ \t]*\)[ \t]*$\n',
                      block, pf, count=1)
          # Disable the local-checkout source path so the archive is used.
          pf = re.sub(r'(?m)^get_filename_component\(SOURCE_PATH.*$',
                      lambda m: "# " + m.group(0), pf)
          with open(path, "w") as f:
              f.write(pf)
          print("Rewrote webpdf.rb and", path)
          PY

      - name: Create pull request
        env:
          TAG: ${{ needs.release.outputs.tag }}
          SHA256: ${{ steps.sums.outputs.sha256 }}
          SHA512: ${{ steps.sums.outputs.sha512 }}
        run: |
          if git diff --quiet; then
            echo "No manifest changes; nothing to do."; exit 0
          fi
          BRANCH="chore/checksums-$TAG"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git diff > packaging.diff
          git add webpdf.rb ports/webpdf/portfile.cmake
          git commit -m "chore: update packaging checksums for $TAG"
          git push -u origin "$BRANCH" --force

          {
            echo "Automated update of release checksums for **$TAG**."
            echo
            echo "- \`webpdf.rb\`: \`url\` + \`sha256\`"
            echo "- \`ports/webpdf/portfile.cmake\`: activated \`vcpkg_from_github\` with real \`SHA512\`"
            echo
            echo "sha256: \`$SHA256\`"
            echo "sha512: \`$SHA512\`"
            echo
            echo '```diff'
            cat packaging.diff
            echo '```'
          } > pr_body.md

          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH" \
            --title "chore: update packaging checksums for $TAG" \
            --body-file pr_body.md
